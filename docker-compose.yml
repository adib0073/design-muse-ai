# Local development — run with: docker compose up --build -d
# For cloud deployment, use deploy.sh instead.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - CORS_ORIGINS=http://localhost:3000
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - generated-assets:/app/generated
      - uploads:/app/uploads
      - ${APPDATA}/gcloud:/root/.config/gcloud:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  generated-assets:
  uploads:
